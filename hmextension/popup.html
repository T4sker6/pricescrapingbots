<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; font-size: 13px; width: 340px; padding: 12px; background: #fff; }
    h2 { font-size: 15px; margin-bottom: 10px; color: #222; }
    h3 { font-size: 13px; margin: 12px 0 6px; color: #444; }
    input { width: 100%; padding: 6px 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 12px; }
    button { padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; }
    .btn-primary { background: #e50010; color: #fff; width: 100%; margin-top: 6px; }
    .btn-primary:hover { background: #c0000d; }
    .status { margin-top: 10px; font-size: 11px; color: #666; }
    .ok { color: #2a7a2a; }
    .err { color: #c00; }
  </style>
</head>
<body>
  <h2>HM Price Tracker</h2>

  <h3>Homelab URL (Tailscale)</h3>
  <input type="text" id="homelabUrl" placeholder="http://100.x.x.x:8080">
  <button class="btn-primary" id="saveBtn">Zapisz i sprawdź połączenie</button>

  <div class="status" id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
